{% extends "base.html" %}

{% block content %}

<div class="container">

    <h2>Create an Account</h2>

    <form action="{{ url_for('register') }}" method="POST">

        <label>Full Name</label>
        <input
            type="text"
            name="full_name"
            placeholder="Enter your full name"
            required>

        <label>Email</label>
        <input
            type="email"
            name="email"
            placeholder="Enter your email"
            required>

        <label>Password</label>
        <input
            type="password"
            name="password"
            placeholder="Create a password"
            required>

        <button type="submit">
            Register
        </button>

    </form>

</div>

{% endblock %}
