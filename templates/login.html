{% extends "base.html" %}

{% block content %}

<h1>Login</h1>

<form method="POST">

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Password</label>
    <input type="password" name="password" required>

    <button type="submit">Login</button>

    <p class="auth-link">
        Don't have an account?
        <a href="{{ url_for('register') }}">Register here</a>
    </p>

</form>

{% endblock %}
