{% extends "base.html" %}

{% block content %}

<div class="resume-preview">

    <h1>Generate Cover Letter</h1>

    <p>
        Creating a cover letter for
        <strong>{{ resume["full_name"] }}</strong>
    </p>

    <form method="POST">

        <label>Company Name</label>
        <input
            type="text"
            name="company_name"
            required
            placeholder="e.g. Google"
        >

        <label>Job Title</label>
        <input
            type="text"
            name="job_title"
            required
            placeholder="e.g. Junior Software Developer"
        >

        <label>Hiring Manager (Optional)</label>
        <input
            type="text"
            name="hiring_manager"
            placeholder="e.g. Jane Doe"
        >

        <button type="submit">
            Generate Cover Letter
        </button>

    </form>

</div>

{% endblock %}
