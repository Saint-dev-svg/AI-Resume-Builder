{%extends  "base.html" %}
{% block content %}

<div class="resume-preview">

    <h1>Saved Resumes</h1>
    <p>All resumes generated using the AI resumes Builder.</p>

    <table class="dashboard-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>

            {% for resume in resumes %}

            <tr>
                <td>{{ resume[0] }}</td>

                <td>
                    <a href="{{url_for('view_resume', resume_id = resume[0]) }}">{{ resume[1] }}</a>
                </td>

                <td>{{ resume[2] }}</td>

                <td>
                    <a href="{{ url_for('delete_resume_route', resume_id = resume[0]) }}"
                    onclick="return confirm('Are you sure you want to delete this resume?');">
                    Delete
                    </a>
                </td>
            </tr>

            {% endfor %}

        </tbody>
    </table>

</div>

{% endblock %}
