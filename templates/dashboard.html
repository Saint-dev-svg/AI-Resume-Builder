{%extends  "base.html" %}
{% block content %}

<div class="resume-preview">

    <h1>Saved Resumes</h1>
    <p>All resumes generated using the AI resumes Builder.</p>

    <div class="stats-container">

        <div class="stat-card">
            <h3>Total Resumes</h3>
            <p>{{ stats.total_resumes }}</p>
        </div>

    </div>

    <form method="GET" action="{{ url_for('dashboard') }}" class="search-form">

        <input
            type="text"
            name="search"
            placeholder="Search by full name..."
            value="{{ search_query }}">

        <button type="submit">Search</button>

    </form>

    <form method="GET" action="{{ url_for('dashboard') }}" class="sort-form">

        <select name="sort" onchange="this.form.submit()">

            <option value="newest"
                {% if sort_by == "newest" %}selected{% endif %}>
                Newest First
            </option>

            <option value="oldest"
                {% if sort_by == "oldest" %}selected{% endif %}>
                Oldest First
            </option>

            <option value="name_asc"
                {% if sort_by == "name_asc" %}selected{% endif %}>
                Name (A–Z)
            </option>

            <option value="name_desc"
                {% if sort_by == "name_desc" %}selected{% endif %}>
                Name (Z–A)
            </option>

        </select>

    </form>

    <table class="dashboard-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>

            {% for resume in resumes %}

            <tr>
                <td>{{ resume[0] }}</td>

                <td>
                    <a href="{{url_for('view_resume', resume_id = resume[0]) }}">{{ resume[1] }}</a>
                </td>

                <td>{{ resume[2] }}</td>

                <td>
                    <a href="{{ url_for('delete_resume_route', resume_id = resume[0]) }}"
                    onclick="return confirm('Are you sure you want to delete this resume?');">
                    Delete
                    </a>
                </td>
            </tr>

            {% endfor %}

        </tbody>
    </table>

</div>

{% endblock %}
