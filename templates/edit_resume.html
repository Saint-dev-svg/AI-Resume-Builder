{% extends "base.html" %}
{% block content %}

<h1>Edit Resume</h1>

<form method="POST">

    <label>Full Name</label>
    <input
        type="text"
        name="full_name"
        value="{{ resume['full_name'] }}"
        required
    >

    <label>Email</label>
    <input
        type="email"
        name="email"
        value="{{ resume['email'] }}"
        required
    >

    <label>Phone Number</label>
    <input
        type="tel"
        name="phone"
        value="{{ resume['phone'] }}"
    >

    <label>Education</label>
    <textarea name="education">{{ resume['education'] }}</textarea>

    <label>Skills</label>
    <textarea name="skills">{{ resume['skills'] }}</textarea>

    <label>Work Experience</label>
    <textarea name="experience">{{ resume['experience'] }}</textarea>

    <label>Professional Summary</label>
    <textarea name="summary">{{ resume['summary'] }}</textarea>

    <button type="submit">Update Resume</button>

</form>

{% endblock %}
